---
# bridge-root — App-of-Apps for the BRIDGE (management) cluster.
#
# The ONLY resource applied manually/by Ansible, once, to bootstrap GitOps on the
# management cluster. It watches apps/ and manages every component Application
# (MetalLB, …) from there.
#
# repoURL is the __GITOPS_REPO_URL__ placeholder, substituted by the installer at
# seed time before this file is pushed to the in-cluster Gitea mirror. Production
# default is the Gitea mirror (air-gap safe):
#   http://gitea-http.gitea.svc.cluster.local:3000/platform/bridge-gitops.git
# For a dev/local apply, substitute the GitHub repo URL by hand first.
#
# Apply once, after ArgoCD is Healthy:
#   kubectl apply -f bootstrap/bridge-root.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bridge-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: __GITOPS_REPO_URL__
    targetRevision: main
    path: apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
