---
# bridge-root — App-of-Apps for the BRIDGE (management) cluster.
#
# The ONLY resource applied manually/by Ansible, once, to bootstrap GitOps on the
# management cluster. It watches apps/ and manages every component Application
# (MetalLB, …) from there.
#
# repoURL: currently set to the GitHub repo for dev/testing (direct kubectl apply).
# For the production / installer-seeded flow, restore the placeholder below so the
# installer substitutes it at seed time before pushing to the in-cluster Gitea mirror:
#   repoURL: __GITOPS_REPO_URL__
#   (production default = http://gitea-http.gitea.svc.cluster.local:3000/platform/bridge-gitops.git , air-gap safe)
#
# Apply once, after ArgoCD is Healthy:
#   kubectl apply -f bootstrap/bridge-root.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bridge-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/abhilash-armada-ai/argo-gitops.git
    targetRevision: main
    path: apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
