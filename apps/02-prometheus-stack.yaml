---
# kube-prometheus-stack — Prometheus + Grafana + Alertmanager. sync-wave 2.
# Chart: https://prometheus-community.github.io/helm-charts  version 82.10.4
#   (= installer kube_prometheus_stack_version)
# Values mirrored from the installer's templates/charts/prometheus-stack/values.yaml
# (amcop_image_registry -> docker.io; airgap-only blocks dropped).
# NOTE: the Mimir remoteWrite target and the Mimir/Loki Grafana datasources point at
# the `observability` namespace — those components are not in GitOps yet, so they stay
# inactive (Prometheus tolerates remote-write failures) until they are migrated.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 82.10.4
    helm:
      values: |
        global:
          imagePullSecrets:
            - name: armada-registry
        grafana:
          image:
            registry: docker.io
            repository: amcop/armada-grafana
            tag: "28.04.2026"
          sidecar:
            image:
              registry: docker.io
              repository: amcop/k8s-sidecar
          additionalDataSources:
            - name: mimir
              uid: mimir
              type: prometheus
              access: proxy
              url: http://grafana-tenant-proxy.observability.svc.cluster.local:8080/prometheus
              isDefault: false
              editable: true
              jsonData:
                timeInterval: 15s
                scrapeInterval: 15s
                queryTimeout: 180s
            - name: loki
              uid: loki
              type: loki
              access: proxy
              url: http://loki.observability.svc.cluster.local:3100
              isDefault: false
              editable: true
              jsonData:
                maxLines: 1000
                queryTimeout: 180s
          service:
            type: NodePort
            nodePort: 32183
          grafana.ini:
            auth.anonymous:
              enabled: true
            auth.proxy:
              enabled: true
              header_name: X-WEBAUTH-USER
              header_property: username
              auto_sign_up: true
            dataproxy:
              send_user_header: true
            security:
              allow_embedding: true
            live:
              allowed_origins: "*"
            server:
              domain: localhost
              http_port: 3000
              root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana/prometheus"
              serve_from_sub_path: true
        # Kubelet / cAdvisor: required for container_* metrics used by pod dashboards.
        kubelet:
          enabled: true
          serviceMonitor:
            enabled: true
            kubelet: true
            cAdvisor: true
            https: true
            insecureSkipVerify: true
            probes: true
        prometheus:
          prometheusSpec:
            retention: 24h
            externalLabels:
              # was {{ cluster_name | default('cluster') }} in the Ansible template
              cluster: "cluster"
              cluster_id: "cluster"
            image:
              registry: docker.io
              repository: amcop/prometheus
            remoteWrite:
              - url: http://mimir-distributor.observability.svc.cluster.local:8080/api/v1/push
                headers:
                  X-Scope-OrgID: fake
            additionalScrapeConfigs:
              - job_name: 'compute_nodes'
                relabel_configs:
                  - replacement: fake
                    target_label: tenant_id
                static_configs:
                  - targets:
                    - 127.0.0.1:9100
        prometheusOperator:
          image:
            registry: docker.io
            repository: amcop/prometheus-operator
          prometheusConfigReloader:
            image:
              registry: docker.io
              repository: amcop/prometheus-config-reloader
        alertmanager:
          alertmanagerSpec:
            image:
              registry: docker.io
              repository: amcop/alertmanager
        prometheus-node-exporter:
          enabled: true
          image:
            registry: docker.io
            repository: amcop/node-exporter
        kube-state-metrics:
          image:
            registry: docker.io
            repository: amcop/kube-state-metrics
  destination:
    server: https://kubernetes.default.svc
    namespace: prometheus
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
