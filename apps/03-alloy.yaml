---
# Grafana Alloy — log/metrics collector (DaemonSet). sync-wave 3.
# Chart: https://grafana.github.io/helm-charts  alloy 1.6.1 (= installer alloy_version)
# Mirrored from the installer's templates/charts/alloy/values.yaml (Task 89)
# with amcop_image_registry -> docker.io. No secrets — config references in-cluster
# loki / cortex-tenant endpoints by DNS.
#
# Notes:
#  - Namespace observability is Ansible-seeded with the armada-registry pull secret.
#  - Writes logs to loki.observability:3100 and metrics to cortex-tenant.observability:8080,
#    so it depends on loki + mimir + cortex-tenant being present (same wave/after).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: 1.6.1
    helm:
      values: |
        image:
          registry: docker.io
          repository: amcop/alloy

        global:
          image:
            pullSecrets:
              - name: armada-registry

          podSecurityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

          mounts:
            extra:
              - name: varlogs
                mountPath: /var/log
                readOnly: true
              - name: varlogpods
                mountPath: /var/log/pods
                readOnly: true

        controller:
          type: daemonset

          volumes:
            extra:
              - name: varlogs
                hostPath:
                  path: /var/log
              - name: varlogpods
                hostPath:
                  path: /var/log/pods

        alloy:
          configMap:
            content: |
              // Discover pods ONLY in amcop-system namespace
              discovery.kubernetes "amcop_pods" {
                role = "pod"
                namespaces {
                  names = ["amcop-system"]
                }
              }

              // Filter to collect ONLY orchestrator container logs
              discovery.relabel "orchestrator_only" {
                targets = discovery.kubernetes.amcop_pods.targets

                // Keep only amcop-system namespace
                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  action = "keep"
                  regex = "amcop-system"
                }

                // Keep only containers named exactly "orchestrator"
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  action = "keep"
                  regex = "orchestrator"
                }

                // Add useful labels
                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label = "namespace"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label = "container"
                }
              }

              // Collect logs from orchestrator container only
              loki.source.kubernetes "orchestrator_logs" {
                targets    = discovery.relabel.orchestrator_only.output
                forward_to = [loki.process.orchestrator_processing.receiver]
              }

              // Process orchestrator logs
              loki.process "orchestrator_processing" {
                // Add basic labels
                stage.labels {
                  values = {
                    namespace    = "amcop-system",
                    service_name = "orchestrator",
                  }
                }

                forward_to = [loki.write.loki_endpoint.receiver]
              }

              otelcol.receiver.otlp "default" {
                http {
                  endpoint = "0.0.0.0:4318"
                }
                grpc {
                  endpoint = "0.0.0.0:4317"
                }

                output {
                  logs = [otelcol.processor.transform.promote_labels.input]
                }
              }

              // Copy per-record attributes to resource attributes (underscore names
              // to avoid gjson dot-path issues in the loki.process stage below)
              otelcol.processor.transform "promote_labels" {
                error_mode = "ignore"
                log_statements {
                  context = "log"
                  statements = [
                    "set(resource.attributes[\"event_name\"], attributes[\"event.name\"])",
                    "set(resource.attributes[\"event_domain\"], attributes[\"event.domain\"])",
                    "set(resource.attributes[\"user_role\"], attributes[\"user.role\"])",
                    "set(resource.attributes[\"audit\"], attributes[\"audit\"])",
                    "set(resource.attributes[\"audit_action\"], attributes[\"audit_action\"])",
                  ]
                }
                output {
                  logs = [otelcol.exporter.loki.default.input]
                }
              }

              // otelcol.exporter.loki does not promote all resource attributes to Loki
              // stream labels automatically. Forward to loki.process to do it explicitly.
              otelcol.exporter.loki "default" {
                forward_to = [loki.process.label_extractor.receiver]
              }

              loki.process "label_extractor" {
                forward_to = [loki.write.loki_endpoint.receiver]

                stage.json {
                  expressions = {
                    event_name   = "resources.event_name",
                    event_domain = "resources.event_domain",
                    user_role    = "resources.user_role",
                    audit        = "resources.audit",
                    audit_action = "resources.audit_action",
                  }
                }

                stage.labels {
                  values = {
                    event_name   = "",
                    event_domain = "",
                    user_role    = "",
                    audit        = "",
                    audit_action = "",
                  }
                }

                stage.label_drop {
                  values = ["pod", "instance"]
                }
              }

              // Write to Loki
              loki.write "loki_endpoint" {
                endpoint {
                  url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
                }
              }

              // Scrape orchestrator metrics
              prometheus.scrape "orchestrator" {
                targets = [{
                  __address__ = "orchestrator.amcop-system.svc.cluster.local:9061",
                }]
                forward_to      = [prometheus.remote_write.mimir.receiver]
                scrape_interval = "30s"
                metrics_path    = "/metrics"
              }

              // Scrape SQL exporter /metrics endpoint for different metrics

              prometheus.scrape "postgres" {
                targets = [{
                  __address__ = "postgres-postgresql-metrics.amcop-system.svc.cluster.local:9187",
                }]
                forward_to      = [prometheus.remote_write.mimir.receiver]
                scrape_interval = "30s"
                metrics_path    = "/metrics"
              }

              // Remote write to Mimir
              prometheus.remote_write "mimir" {
                endpoint {
                  url = "http://cortex-tenant.observability.svc.cluster.local:8080/push"
                }
              }

          extraPorts:
            - name: otlp-grpc
              port: 4317
              targetPort: 4317
              protocol: TCP
            - name: otlp-http
              port: 4318
              targetPort: 4318
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsGroup: 473
            runAsUser: 473

        configReloader:
          image:
            registry: docker.io
            repository: amcop/prometheus-config-reloader
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 65534
            runAsUser: 65534
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
