---
# ingress-nginx — NGINX Ingress controller. sync-wave 2.
# Chart: https://kubernetes.github.io/ingress-nginx  version 4.14.4 (= installer ingress_nginx_version)
# Mirrored from the installer's templates/charts/ingress/values.yaml (standalone, Task 70)
# with amcop_image_registry -> docker.io.
#
# Notes:
#  - service.type LoadBalancer needs a MetalLB IPAddressPool. That pool (runtime
#    cluster_lb_ip) is still Ansible-managed (installer Task 19) and NOT in gitops
#    yet, per the README — so the Service stays <pending> until Ansible seeds it.
#  - The installer adds `metallb.io/allow-shared-ip: cluster-ip` only when the
#    deployment shares one LB IP (runtime is_cluster_lb_ip). Uncomment below if so.
#  - The `armada-registry` imagePullSecret in amcop-system is Ansible-seeded
#    (namespace_setup.yaml), as for every other component here.
#  - SeaweedFS (wave 2) and other components create Ingress objects with
#    className: nginx; this controller serves them.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.14.4
    helm:
      values: |
        imagePullSecrets:
          - name: armada-registry
        controller:
          image:
            registry: docker.io
            image: amcop/ingress-nginx-controller
            digest: ""
          replicaCount: 1
          admissionWebhooks:
            patch:
              image:
                registry: docker.io
                image: amcop/ingress-nginx-kube-webhook-certgen
                digest: ""
          service:
            type: LoadBalancer
            # annotations:
            #   metallb.io/allow-shared-ip: cluster-ip
            ports:
              http: 80
              https: 443
  destination:
    server: https://kubernetes.default.svc
    namespace: amcop-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
